# Pinned project name so the DB volume stays the same regardless of the folder
# name (Compose otherwise derives the project — and thus the volume — from the
# directory, so renaming the folder would orphan the existing data).
name: chatbot

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
